<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Notícias - Paróquia de Ondina</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* DEFINIÇÃO DAS CORES DA MARCA PARÓQUIA DE ONDINA - RESSURREIÇÃO DO SENHOR */
        :root {
            --brand-dark-blue: #295F8E; /* Azul escuro principal */
            --brand-light-blue: #4F93D0; /* Azul claro secundário */
            --primary-gold: #FFD700; /* Dourado (apenas para toques especiais) */
            --white: #FFFFFF;
            --light-gray: #f8f9fa; /* Fundo mais quente */
            --dark-text: #333;
            --card-gray: #e9ecef; /* Separadores */
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--light-gray);
            color: var(--dark-text);
            margin: 0;
            padding: 0;
        }

        /* HEADER REDESENHADO COM AS CORES E TÍTULOS DA MARCA */
        header {
            background-color: var(--brand-dark-blue);
            color: var(--white);
            padding: 2.5rem 1rem 1.5rem;
            text-align: center;
            border-bottom: 3px solid var(--brand-light-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .header-title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
        }

        .brand-p-de-ondina {
            font-size: 0.95rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--brand-light-blue); /* Texto menor em azul claro */
        }

        .brand-r-do-senhor {
            font-size: 1.9rem;
            font-weight: bold;
            color: var(--white); /* Texto maior em branco */
            font-family: 'Cinzel', serif; /* Mantemos o Cinzel para um toque solene */
        }

        header p.subtitle {
            margin-top: 5px;
            font-size: 0.9rem;
            opacity: 0.8;
            color: var(--white);
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Grid de Notícias */
        #news-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); /* Aumentado um pouco o tamanho */
            gap: 20px;
        }

        /* Animação de Entrada para os Cards */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* DESIGN MODERNO E LIMPO DOS CARDS */
        .news-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.6s ease-out forwards;
        }

        .news-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .news-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid var(--card-gray);
            /* Imagem começa escondida para animação */
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }

        .news-image.loaded {
            opacity: 1;
        }

        .news-content {
            padding: 20px;
            flex-grow: 1;
        }

        .news-source {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--brand-light-blue); /* Fonte em azul claro */
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .news-title {
            font-size: 1.3rem;
            margin: 0 0 12px 0;
            color: var(--dark-text);
            line-height: 1.4;
        }

        .news-date {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .btn-link {
            display: inline-block;
            margin-top: auto;
            padding: 12px;
            background-color: var(--brand-dark-blue); /* Botão em azul escuro */
            color: var(--white);
            text-decoration: none;
            border-radius: 0 0 12px 12px; /* Arredondado só embaixo */
            font-weight: bold;
            text-align: center;
            width: 100%;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
            border: none;
            transition: background-color 0.2s ease;
        }

        .btn-link:hover {
            background-color: #1e537e; /* Azul ainda mais escuro no hover */
        }

        /* FOOTER ATUALIZADO COM OS DADOS DA PARÓQUIA */
        footer {
            margin-top: 50px;
            padding: 30px;
            background-color: #f1f3f5; /* Fundo do rodapé mais sutil */
            border-top: 1px solid #ddd;
            text-align: center;
        }

        .paroquia-de-ondina-footer {
            font-weight: bold;
            color: var(--brand-dark-blue);
        }

        .version-tag {
            background: var(--primary-gold); /* Mantemos o dourado só para a tag de versão */
            color: var(--brand-dark-blue);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Loading Spinner em azul */
        .loader {
            text-align: center;
            font-size: 1.5rem;
            padding: 50px;
            color: var(--brand-dark-blue);
        }
    </style>
</head>
<body>

<header>
    <div class="header-title-container">
        <span class="brand-p-de-ondina">PARÓQUIA DE ONDINA</span>
        <span class="brand-r-do-senhor">RESSURREIÇÃO DO SENHOR</span>
    </div>
    <p class="subtitle">Radar de Notícias Católicas</p>
</header>

<div class="container">
    <div id="loader" class="loader">Buscando as últimas notícias...</div>
    <div id="news-container"></div>
</div>

<footer>
    <p>
        © 2026 Paróquia de Ondina - Ressurreição do Senhor | 
        Versão: <span class="version-tag">2.1.3</span>
    </p>
</footer>

<script>
    // FONTES DE NOTÍCIAS (MANTIDAS)
    const sites = [
        {
            name: "CNBB",
            url: "https://www.cnbb.org.br/wp-json/wp/v2/posts?_embed&per_page=6"
        },
        {
            name: "Canção Nova",
            url: "https://noticias.cancaonova.com/wp-json/wp/v2/posts?_embed&per_page=6"
        },
        {
            name: "Arquidiocese de Salvador",
            url: "https://arquidiocesesalvador.org.br/wp-json/wp/v2/posts?_embed&per_page=4" 
        }
    ];

    // LÓGICA DA IMAGEM CORINGA
    // Utilize o arquivo da sua marca como fallback. 
    // Supondo que você o tenha como image_0.png no mesmo diretório.
    const jokerImagePath = "./image_0.png";

    // PROXY PARA CONTORNAR CORS (MANTIDO)
    const proxyGetPrefix = "https://api.allorigins.win/get?url=";
    const proxyRawPrefix = "https://api.allorigins.win/raw?url=";

    async function fetchNews() {
        const container = document.getElementById('news-container');
        const loader = document.getElementById('loader');
        let allPosts = [];

        try {
            const requests = sites.map(site => {
                const proxyUrl = proxyGetPrefix + encodeURIComponent(site.url);
                
                return fetch(proxyUrl)
                    .then(res => {
                        if (!res.ok) throw new Error("Falha de rede no Proxy");
                        return res.json();
                    })
                    .then(data => {
                        if (!data.contents) return [];
                        const posts = JSON.parse(data.contents);
                        return posts.map(post => ({ ...post, sourceName: site.name }));
                    })
                    .catch(err => {
                        console.error(`Erro ao carregar ${site.name}:`, err);
                        return []; 
                    });
            });

            const results = await Promise.all(requests);
            
            allPosts = results.flat().sort((a, b) => new Date(b.date) - new Date(a.date));

            loader.style.display = 'none';

            if(allPosts.length === 0) {
                container.innerHTML = "<h3 style='text-align:center; width:100%; color:var(--brand-dark-blue);'>Não foi possível carregar as notícias no momento.</h3>";
            } else {
                renderPosts(allPosts);
            }

        } catch (error) {
            loader.innerHTML = "Ocorreu um erro grave ao carregar o radar.";
            console.error(error);
        }
    }

    function renderPosts(posts) {
        const container = document.getElementById('news-container');
        
        posts.forEach((post, index) => {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.style.animationDelay = `${index * 0.05}s`;

            // LÓGICA DE SELEÇÃO E PROXY DA IMAGEM
            let rawFeaturedImage = null;
            if (post._embedded && post._embedded['wp:featuredmedia'] && post._embedded['wp:featuredmedia'][0]) {
                rawFeaturedImage = post._embedded['wp:featuredmedia'][0].source_url;
            }

            let finalImageSrc;
            if (rawFeaturedImage) {
                // Se houver imagem destacada, passe-a pelo proxy 'raw' para CORS
                finalImageSrc = proxyRawPrefix + encodeURIComponent(rawFeaturedImage);
            } else {
                // Senão, use a imagem coringa local. Não precisa de proxy CORS.
                finalImageSrc = jokerImagePath;
            }

            const dateFormatted = new Date(post.date).toLocaleDateString('pt-BR');
            const title = post.title && post.title.rendered ? post.title.rendered : 'Título indisponível';

            card.innerHTML = `
                <img src="${finalImageSrc}" class="news-image" alt="Imagem da notícia" onerror="this.src='https://via.placeholder.com/400x250?text=Erro+na+Imagem'">
                <div class="news-content">
                    <span class="news-source">${post.sourceName}</span>
                    <h2 class="news-title">${title}</h2>
                    <span class="news-date">📅 ${dateFormatted}</span>
                </div>
                <a href="${post.link}" target="_blank" class="btn-link">Leia mais</a>
            `;
            container.appendChild(card);
            
            // Ativa a animação de entrada da imagem assim que ela é carregada
            const img = card.querySelector('.news-image');
            img.addEventListener('load', () => img.classList.add('loaded'));
        });
    }

    // Iniciar busca
    fetchNews();
</script>

</body>
</html>
