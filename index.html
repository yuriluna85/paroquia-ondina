<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Religioso - Paróquia de Ondina (Mural v3.1)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* DEFINIÇÃO DAS CORES DA MARCA PARÓQUIA DE ONDINA */
        :root {
            --brand-dark-blue: #295F8E; 
            --brand-light-blue: #4F93D0; 
            --primary-gold: #FFD700; 
            --white: #FFFFFF;
            --light-gray: #f8f9fa; 
            --dark-text: #333;
            --card-gray: #e9ecef; 
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--light-gray);
            color: var(--dark-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER OTIMIZADO PARA TELAS DE MÍDIA INDOOR */
        header {
            background-color: var(--brand-dark-blue);
            color: var(--white);
            padding: 1rem 2rem;
            text-align: left;
            border-bottom: 3px solid var(--brand-light-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left-container {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .brand-p-de-ondina {
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--brand-light-blue); 
        }

        .brand-r-do-senhor {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--white); 
            font-family: 'Cinzel', serif; 
        }

        header p.subtitle {
            margin-top: 5px;
            font-size: 1rem;
            opacity: 0.8;
            color: var(--white);
        }

        /* RELÓGIO DIGITAL INTEGRADO */
        .header-clock-container {
            text-align: right;
            border-left: 2px solid var(--brand-light-blue);
            padding-left: 20px;
        }

        .clock-time {
            font-size: 2.8rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums; 
        }

        .clock-date {
            font-size: 1.2rem;
            font-weight: 300;
        }

        .container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 15px;
        }

        /* CONTAINER DO CARROSSEL DE NOTÍCIAS */
        #news-container {
            position: relative;
            width: 100%;
            height: 700px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes crossFade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* DESIGN DO CARD */
        .news-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            display: none; 
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            height: 100%;
            animation: crossFade 1s ease-in-out;
        }

        .news-card.active {
            display: flex;
        }

        .img-wrapper {
            width: 100%;
            height: 400px; 
            overflow: hidden;
            border-bottom: 1px solid var(--card-gray);
        }

        .news-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .news-content {
            padding: 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .news-source {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--brand-light-blue); 
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .news-title {
            font-size: 2.2rem; 
            margin: 0 0 15px 0;
            color: var(--dark-text);
            line-height: 1.3;
        }

        /* ÁREA INFERIOR DO CARD: DATA + QR CODE */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
        }

        .news-date {
            font-size: 1.3rem;
            color: #6c757d;
            margin-bottom: 10px;
        }

        /* ESTILOS DO QR CODE */
        .qr-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--light-gray);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--card-gray);
        }

        .qr-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--brand-dark-blue);
            max-width: 140px;
            text-align: right;
            line-height: 1.2;
        }

        .qr-code-canvas {
            width: 90px;
            height: 90px;
            background: var(--white);
            padding: 5px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* RODAPÉ */
        footer {
            margin-top: auto;
            padding: 15px;
            background-color: #f1f3f5; 
            border-top: 1px solid #ddd;
            text-align: center;
        }

        .version-tag {
            background: var(--primary-gold); 
            color: var(--brand-dark-blue);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .loader {
            text-align: center;
            font-size: 1.5rem;
            padding: 50px;
            color: var(--brand-dark-blue);
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left-container">
        <span class="brand-p-de-ondina">PARÓQUIA DE ONDINA</span>
        <span class="brand-r-do-senhor">RESSURREIÇÃO DO SENHOR</span>
        <p class="subtitle">Radar de Notícias Católicas</p>
    </div>
    <div class="header-clock-container">
        <div id="clock-time" class="clock-time">00:00:00</div>
        <div id="clock-date" class="clock-date">Carregando data...</div>
    </div>
</header>

<div class="container">
    <div id="loader" class="loader">Carregando o painel de notícias...</div>
    <div id="news-container"></div>
</div>

<footer>
    <p>
        © 2026 Paróquia de Ondina - Ressurreição do Senhor | Cristã Católica Apostólica Romana |
        Versão: <span class="version-tag">3.1.0</span>
    </p>
</footer>

<script>
    const sites = [
        {
            name: "O Ressuscitado (Paróquia)",
            url: "https://api.rss2json.com/v1/api.json?rss_url=https://www.paroquiadeondina.com.br/blog-feed.xml",
            type: "rss"
        },
        {
            name: "CNBB",
            url: "https://www.cnbb.org.br/wp-json/wp/v2/posts?_embed&per_page=6",
            type: "wp"
        },
        {
            name: "Canção Nova",
            url: "https://noticias.cancaonova.com/wp-json/wp/v2/posts?_embed&per_page=6",
            type: "wp"
        },
        {
            name: "Arquidiocese de Salvador",
            url: "https://arquidiocesesalvador.org.br/wp-json/wp/v2/posts?_embed&per_page=4",
            type: "wp"
        }
    ];

    const jokerImagePath = "https://github.com/yuriluna85/paroquia-ondina/blob/main/Paroquia_Ondina.png?raw=true";
    const proxyPrefix = "https://corsproxy.io/?";

    // RELÓGIO
    function updateClock() {
        const now = new Date();
        const timeElement = document.getElementById('clock-time');
        const dateElement = document.getElementById('clock-date');
        
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        timeElement.textContent = `${hours}:${minutes}:${seconds}`;
        
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateElement.textContent = now.toLocaleDateString('pt-BR', options);
    }
    updateClock();
    setInterval(updateClock, 1000);

    async function fetchNews() {
        const container = document.getElementById('news-container');
        const loader = document.getElementById('loader');
        let allPosts = [];

        try {
            const requests = sites.map(site => {
                if (site.type === 'rss') {
                    return fetch(site.url)
                        .then(res => res.json())
                        .then(data => {
                            if (data.status !== 'ok' || !data.items) return [];
                            return data.items.map(item => ({
                                title: { rendered: item.title },
                                date: item.pubDate,
                                link: item.link,
                                sourceName: site.name,
                                isRss: true, 
                                _embedded: {
                                    'wp:featuredmedia': [
                                        { source_url: item.thumbnail || (item.enclosure ? item.enclosure.link : null) }
                                    ]
                                }
                            }));
                        })
                        .catch(err => {
                            console.error(`Erro ao carregar RSS de ${site.name}:`, err);
                            return []; 
                        });
                } else {
                    const proxyUrl = proxyPrefix + encodeURIComponent(site.url);
                    return fetch(proxyUrl)
                        .then(res => {
                            if (!res.ok) throw new Error("Falha de rede no Proxy");
                            return res.json();
                        })
                        .then(posts => {
                            return posts.map(post => ({ ...post, sourceName: site.name }));
                        })
                        .catch(err => {
                            console.error(`Erro ao carregar WP ${site.name}:`, err);
                            return []; 
                        });
                }
            });

            const results = await Promise.all(requests);
            allPosts = results.flat().sort((a, b) => new Date(b.date) - new Date(a.date));

            loader.style.display = 'none';

            if(allPosts.length === 0) {
                container.innerHTML = "<h3 style='text-align:center; width:100%; color:var(--brand-dark-blue);'>Não foi possível carregar as notícias.</h3>";
            } else {
                renderPosts(allPosts);
            }

        } catch (error) {
            loader.innerHTML = "Ocorreu um erro grave ao carregar o radar.";
            console.error(error);
        }
    }

    function renderPosts(posts) {
        const container = document.getElementById('news-container');
        
        posts.forEach((post, index) => {
            const card = document.createElement('div');
            card.className = 'news-card';

            let rawFeaturedImage = null;
            if (post._embedded && post._embedded['wp:featuredmedia'] && post._embedded['wp:featuredmedia'][0]) {
                rawFeaturedImage = post._embedded['wp:featuredmedia'][0].source_url;
            }

            let finalImageSrc = jokerImagePath;
            let isJoker = true;

            if (rawFeaturedImage) {
                isJoker = false;
                if (post.isRss) {
                    finalImageSrc = rawFeaturedImage;
                } else {
                    finalImageSrc = proxyPrefix + encodeURIComponent(rawFeaturedImage);
                }
            }

            const dateFormatted = new Date(post.date).toLocaleDateString('pt-BR');
            const title = post.title && post.title.rendered ? post.title.rendered : 'Título indisponível';
            const imgStyle = isJoker ? "object-fit: contain; padding: 40px;" : "";

            // Novo layout integrando o contêiner do QR Code
            card.innerHTML = `
                <div class="img-wrapper">
                    <img src="${finalImageSrc}" class="news-image" alt="Imagem da notícia" style="${imgStyle}" 
                         onerror="this.onerror=null; this.src='${jokerImagePath}'; this.style.objectFit='contain'; this.style.padding='40px';">
                </div>
                <div class="news-content">
                    <span class="news-source">${post.sourceName}</span>
                    <h2 class="news-title">${title}</h2>
                    
                    <div class="card-footer">
                        <span class="news-date">📅 ${dateFormatted}</span>
                        <div class="qr-container">
                            <span class="qr-text">Escaneie para ler no celular:</span>
                            <div class="qr-code-canvas" id="qrcode-${index}"></div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);

            // Gera o QR Code dinamicamente usando a cor da marca
            if(post.link) {
                new QRCode(document.getElementById(`qrcode-${index}`), {
                    text: post.link,
                    width: 90,
                    height: 90,
                    colorDark : "#295F8E", // Azul da marca
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.L
                });
            }
        });

        startCarousel();
    }

    function startCarousel() {
        const cards = document.querySelectorAll('.news-card');
        let currentIndex = 0;
        
        if (cards.length === 0) return;

        cards[currentIndex].classList.add('active');

        // Alterna os cards a cada 15 segundos
        setInterval(() => {
            cards[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % cards.length;
            cards[currentIndex].classList.add('active');
        }, 15000); 
    }

    fetchNews();
</script>

</body>
</html>
