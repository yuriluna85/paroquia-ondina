<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Notícias - Paróquia de Ondina</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* DEFINIÇÃO DAS CORES DA MARCA PARÓQUIA DE ONDINA */
        :root {
            --brand-dark-blue: #295F8E; 
            --brand-light-blue: #4F93D0; 
            --primary-gold: #FFD700; 
            --white: #FFFFFF;
            --light-gray: #f8f9fa; 
            --dark-text: #333;
            --card-gray: #e9ecef; 
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--light-gray);
            color: var(--dark-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--brand-dark-blue);
            color: var(--white);
            padding: 2.5rem 1rem 1.5rem;
            text-align: center;
            border-bottom: 3px solid var(--brand-light-blue);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .header-title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
        }

        .brand-p-de-ondina {
            font-size: 0.95rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--brand-light-blue); 
        }

        .brand-r-do-senhor {
            font-size: 1.9rem;
            font-weight: bold;
            color: var(--white); 
            font-family: 'Cinzel', serif; 
        }

        header p.subtitle {
            margin-top: 5px;
            font-size: 0.9rem;
            opacity: 0.8;
            color: var(--white);
        }

        .container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 15px;
        }

        /* CONTAINER DO CARROSSEL */
        #news-container {
            position: relative;
            width: 100%;
            max-width: 900px; /* Card bem largo para painéis/telas */
            height: 650px; /* Altura fixa para evitar pulos de layout */
            background-color: transparent;
        }

        /* LÓGICA DE TRANSIÇÃO SUAVE DOS CARDS */
        .news-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            
            /* Estado invisível padrão */
            opacity: 0;
            visibility: hidden;
            z-index: 0;
            transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
        }

        /* Card Atualmente na Tela */
        .news-card.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        /* Card que está saindo (Mantém ele atrás do novo enquanto desaparece) */
        .news-card.last-active {
            opacity: 0;
            visibility: hidden;
            z-index: 1; 
        }

        /* WRAPPER E ANIMAÇÃO DA IMAGEM */
        .img-wrapper {
            width: 100%;
            height: 380px; /* Imagem mais alta para o carrossel */
            overflow: hidden;
            border-bottom: 1px solid var(--card-gray);
            background-color: var(--white); /* Fundo branco para a coringa */
        }

        .news-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1);
        }

        /* O segredo para não "quebrar": a animação roda no active e no last-active */
        .news-card.active .news-image,
        .news-card.last-active .news-image {
            animation: smoothZoom 14s linear forwards; 
        }

        @keyframes smoothZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); } /* Zoom suave de 15% */
        }

        .news-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .news-source {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--brand-light-blue); 
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .news-title {
            font-size: 1.8rem; /* Título maior para leitura à distância */
            margin: 0 0 15px 0;
            color: var(--dark-text);
            line-height: 1.3;
        }

        .news-date {
            font-size: 1rem;
            color: #6c757d;
            margin-top: auto;
        }

        /* BARRA DE PROGRESSO DO TEMPO */
        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: var(--card-gray);
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--brand-light-blue);
            width: 0%;
        }

        /* A barra enche em exatos 12 segundos */
        .news-card.active .progress-bar {
            animation: progressTime 12s linear forwards;
        }

        @keyframes progressTime {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        footer {
            margin-top: auto;
            padding: 30px;
            background-color: #f1f3f5; 
            border-top: 1px solid #ddd;
            text-align: center;
        }

        .version-tag {
            background: var(--primary-gold); 
            color: var(--brand-dark-blue);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .loader {
            text-align: center;
            font-size: 1.5rem;
            padding: 50px;
            color: var(--brand-dark-blue);
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <div class="header-title-container">
        <span class="brand-p-de-ondina">PARÓQUIA DE ONDINA</span>
        <span class="brand-r-do-senhor">RESSURREIÇÃO DO SENHOR</span>
    </div>
    <p class="subtitle">Radar de Notícias Católicas</p>
</header>

<div class="container">
    <div id="loader" class="loader">Carregando o painel de notícias...</div>
    <div id="news-container"></div>
</div>

<footer>
    <p>
        © 2026 Paróquia de Ondina - Ressurreição do Senhor | 
        Versão: <span class="version-tag">2.1.8</span>
    </p>
</footer>

<script>
    const sites = [
        {
            name: "O Ressuscitado (Paróquia)",
            url: "https://api.rss2json.com/v1/api.json?rss_url=https://www.paroquiadeondina.com.br/blog-feed.xml",
            type: "rss"
        },
        {
            name: "CNBB",
            url: "https://www.cnbb.org.br/wp-json/wp/v2/posts?_embed&per_page=6",
            type: "wp"
        },
        {
            name: "Canção Nova",
            url: "https://noticias.cancaonova.com/wp-json/wp/v2/posts?_embed&per_page=6",
            type: "wp"
        },
        {
            name: "Arquidiocese de Salvador",
            url: "https://arquidiocesesalvador.org.br/wp-json/wp/v2/posts?_embed&per_page=4",
            type: "wp"
        }
    ];

    const jokerImagePath = "https://github.com/yuriluna85/paroquia-ondina/blob/main/Paroquia_Ondina.png?raw=true";
    const proxyPrefix = "https://corsproxy.io/?";

    async function fetchNews() {
        const container = document.getElementById('news-container');
        const loader = document.getElementById('loader');
        let allPosts = [];

        try {
            const requests = sites.map(site => {
                if (site.type === 'rss') {
                    return fetch(site.url)
                        .then(res => res.json())
                        .then(data => {
                            if (data.status !== 'ok' || !data.items) return [];
                            return data.items.map(item => ({
                                title: { rendered: item.title },
                                date: item.pubDate,
                                link: item.link,
                                sourceName: site.name,
                                isRss: true, 
                                _embedded: {
                                    'wp:featuredmedia': [
                                        { source_url: item.thumbnail || (item.enclosure ? item.enclosure.link : null) }
                                    ]
                                }
                            }));
                        })
                        .catch(err => {
                            console.error(`Erro ao carregar RSS de ${site.name}:`, err);
                            return []; 
                        });
                } else {
                    const proxyUrl = proxyPrefix + encodeURIComponent(site.url);
                    return fetch(proxyUrl)
                        .then(res => {
                            if (!res.ok) throw new Error("Falha de rede no Proxy");
                            return res.json();
                        })
                        .then(posts => {
                            return posts.map(post => ({ ...post, sourceName: site.name }));
                        })
                        .catch(err => {
                            console.error(`Erro ao carregar WP ${site.name}:`, err);
                            return []; 
                        });
                }
            });

            const results = await Promise.all(requests);
            allPosts = results.flat().sort((a, b) => new Date(b.date) - new Date(a.date));

            loader.style.display = 'none';

            if(allPosts.length === 0) {
                container.innerHTML = "<h3 style='text-align:center; width:100%; color:var(--brand-dark-blue);'>Não foi possível carregar as notícias.</h3>";
            } else {
                renderPosts(allPosts);
            }

        } catch (error) {
            loader.innerHTML = "Ocorreu um erro grave ao carregar o radar.";
            console.error(error);
        }
    }

    function renderPosts(posts) {
        const container = document.getElementById('news-container');
        
        posts.forEach((post, index) => {
            const card = document.createElement('div');
            card.className = 'news-card';

            let rawFeaturedImage = null;
            if (post._embedded && post._embedded['wp:featuredmedia'] && post._embedded['wp:featuredmedia'][0]) {
                rawFeaturedImage = post._embedded['wp:featuredmedia'][0].source_url;
            }

            let finalImageSrc = jokerImagePath;
            let isJoker = true;

            if (rawFeaturedImage) {
                isJoker = false;
                if (post.isRss) {
                    finalImageSrc = rawFeaturedImage;
                } else {
                    finalImageSrc = proxyPrefix + encodeURIComponent(rawFeaturedImage);
                }
            }

            const dateFormatted = new Date(post.date).toLocaleDateString('pt-BR');
            const title = post.title && post.title.rendered ? post.title.rendered : 'Título indisponível';
            
            const imgStyle = isJoker ? "object-fit: contain; padding: 30px;" : "";

            card.innerHTML = `
                <div class="img-wrapper">
                    <img src="${finalImageSrc}" class="news-image" alt="Imagem da notícia" style="${imgStyle}" 
                         onerror="this.onerror=null; this.src='${jokerImagePath}'; this.style.objectFit='contain'; this.style.padding='30px';">
                </div>
                <div class="news-content">
                    <span class="news-source">${post.sourceName}</span>
                    <h2 class="news-title">${title}</h2>
                    <span class="news-date">📅 ${dateFormatted}</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar"></div>
                </div>
            `;
            container.appendChild(card);
        });

        startCarousel();
    }

    // LÓGICA DO CARROSSEL
    function startCarousel() {
        const cards = document.querySelectorAll('.news-card');
        if (cards.length === 0) return;

        let currentIndex = 0;
        
        // Ativa o primeiro card
        cards[currentIndex].classList.add('active');

        // Configura o intervalo de 12 segundos
        setInterval(() => {
            // Remove o estado de "saindo" de todos os cards para limpar a fila
            cards.forEach(c => c.classList.remove('last-active'));
            
            // O card atual começa a sair (crossfade)
            cards[currentIndex].classList.remove('active');
            cards[currentIndex].classList.add('last-active');
            
            // Calcula o próximo card e o ativa
            currentIndex = (currentIndex + 1) % cards.length;
            cards[currentIndex].classList.add('active');
            
        }, 12000); // 12000 ms = 12 segundos
    }

    fetchNews();
</script>

</body>
</html>
