<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Notícias Católicas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #FFD700;
            --deep-red: #8B0000;
            --white: #FFFFFF;
            --light-gray: #f4f4f4;
            --dark-text: #2c3e50;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--light-gray);
            color: var(--dark-text);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--deep-red);
            color: var(--primary-gold);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 5px solid var(--primary-gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 {
            font-family: 'Cinzel', serif;
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Grid de Notícias */
        #news-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        /* Card de Notícia */
        .news-card {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        .news-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #ddd;
        }

        .news-content {
            padding: 15px;
            flex-grow: 1;
        }

        .news-source {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--deep-red);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .news-title {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: var(--dark-text);
            line-height: 1.4;
        }

        .news-date {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .btn-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: var(--deep-red);
            color: var(--white);
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
        }

        .btn-link:hover {
            background-color: #a50000;
        }

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 0.9rem;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
        }

        .version-tag {
            background: var(--primary-gold);
            color: var(--deep-red);
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Loading Spinner */
        .loader {
            text-align: center;
            font-size: 1.5rem;
            padding: 50px;
            color: var(--deep-red);
        }
    </style>
</head>
<body>

<header>
    <h1>Radar de Notícias Católicas</h1>
    <p>Informação e Fé em Tempo Real</p>
</header>

<div class="container">
    <div id="loader" class="loader">Buscando as últimas notícias...</div>
    <div id="news-container"></div>
</div>

<footer>
    <p>© 2026 Paróquia de Ondina - Radar Religioso | Versão: <span class="version-tag">2.1.1</span></p>
</footer>

<script>
    // Atualizamos as fontes: Sai ACI Digital (bloqueada), entra Canção Nova
    const sites = [
        {
            name: "CNBB",
            url: "https://www.cnbb.org.br/wp-json/wp/v2/posts?_embed&per_page=6"
        },
        {
            name: "Canção Nova",
            url: "https://noticias.cancaonova.com/wp-json/wp/v2/posts?_embed&per_page=6"
        },
        {
            name: "Arquidiocese de Salvador",
            url: "https://arquidiocesesalvador.org.br/wp-json/wp/v2/posts?_embed&per_page=4" // HTTPS forçado aqui
        }
    ];

    async function fetchNews() {
        const container = document.getElementById('news-container');
        const loader = document.getElementById('loader');
        let allPosts = [];

        try {
            const requests = sites.map(site => {
                // Criamos a URL do proxy que vai "buscar" a notícia para você
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(site.url)}`;
                
                return fetch(proxyUrl)
                    .then(res => {
                        if (!res.ok) throw new Error("Falha de rede no Proxy");
                        return res.json();
                    })
                    .then(data => {
                        // O Proxy devolve os dados dentro de 'contents' como texto, precisamos converter de volta para JSON
                        if (!data.contents) return [];
                        const posts = JSON.parse(data.contents);
                        return posts.map(post => ({ ...post, sourceName: site.name }));
                    })
                    .catch(err => {
                        console.error(`Erro ao carregar ${site.name}:`, err);
                        return []; // Se um falhar, retorna vazio e não quebra os outros
                    });
            });

            const results = await Promise.all(requests);
            
            // Achata o array e ordena da notícia mais recente para a mais antiga
            allPosts = results.flat().sort((a, b) => new Date(b.date) - new Date(a.date));

            loader.style.display = 'none';

            if(allPosts.length === 0) {
                container.innerHTML = "<h3 style='text-align:center; width:100%; color:var(--deep-red);'>Não foi possível carregar as notícias no momento.</h3>";
            } else {
                renderPosts(allPosts);
            }

        } catch (error) {
            loader.innerHTML = "Ocorreu um erro grave ao carregar o radar.";
            console.error(error);
        }
    }

    function renderPosts(posts) {
        const container = document.getElementById('news-container');
        
        posts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'news-card';

            // Busca a imagem de destaque ou coloca um placeholder se não existir
            let featuredImage = 'https://via.placeholder.com/400x250?text=Sem+Imagem';
            if (post._embedded && post._embedded['wp:featuredmedia'] && post._embedded['wp:featuredmedia'][0]) {
                featuredImage = post._embedded['wp:featuredmedia'][0].source_url;
            }

            const dateFormatted = new Date(post.date).toLocaleDateString('pt-BR');
            const title = post.title && post.title.rendered ? post.title.rendered : 'Título indisponível';

            card.innerHTML = `
                <img src="${featuredImage}" class="news-image" alt="Imagem da notícia" onerror="this.src='https://via.placeholder.com/400x250?text=Erro+na+Imagem'">
                <div class="news-content">
                    <span class="news-source">${post.sourceName}</span>
                    <h2 class="news-title">${title}</h2>
                    <span class="news-date">📅 ${dateFormatted}</span>
                </div>
                <a href="${post.link}" target="_blank" class="btn-link">Leia mais</a>
            `;
            container.appendChild(card);
        });
    }

    // Dá a partida na busca
    fetchNews();
</script>

</body>
</html>
